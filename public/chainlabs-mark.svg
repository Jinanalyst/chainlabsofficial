<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="cl-mark" x1="8" y1="56" x2="56" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E5EE0"/>
      <stop offset="55%" stop-color="#2F7BFF"/>
      <stop offset="100%" stop-color="#7FA8FF"/>
    </linearGradient>
    <linearGradient id="cl-arrow" x1="32" y1="32" x2="56" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7FA8FF"/>
      <stop offset="100%" stop-color="#A8C4FF"/>
    </linearGradient>
  </defs>

  <!-- Orbit ring -->
  <circle cx="32" cy="32" r="25" stroke="url(#cl-mark)" stroke-width="1.6" stroke-opacity="0.55" stroke-linecap="round" stroke-dasharray="60 14"/>

  <!-- Orbit dots -->
  <circle cx="11" cy="22" r="2.4" fill="url(#cl-mark)"/>
  <circle cx="20" cy="56" r="2.0" fill="url(#cl-mark)" fill-opacity="0.8"/>
  <circle cx="56" cy="40" r="1.8" fill="#7FA8FF" fill-opacity="0.85"/>

  <!-- Chain link, upper -->
  <path
    d="M37 16
       a9.5 9.5 0 0 1 9.5 9.5
       v3
       a9.5 9.5 0 0 1 -9.5 9.5
       h-3
       a9.5 9.5 0 0 1 -9.5 -9.5"
    stroke="url(#cl-mark)" stroke-width="4.2" stroke-linecap="round" fill="none"/>

  <!-- Chain link, lower -->
  <path
    d="M27 48
       a9.5 9.5 0 0 1 -9.5 -9.5
       v-3
       a9.5 9.5 0 0 1 9.5 -9.5
       h3
       a9.5 9.5 0 0 1 9.5 9.5"
    stroke="url(#cl-mark)" stroke-width="4.2" stroke-linecap="round" fill="none"/>

  <!-- Arrow stem -->
  <path d="M40 24 L54 10" stroke="url(#cl-arrow)" stroke-width="3.4" stroke-linecap="round"/>
  <!-- Arrow head -->
  <path d="M46 9 L55 9 L55 18" stroke="url(#cl-arrow)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>

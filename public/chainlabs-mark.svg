<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="cl-grad" x1="14" y1="66" x2="66" y2="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E5EE0"/>
      <stop offset="50%" stop-color="#2F7BFF"/>
      <stop offset="100%" stop-color="#7FA8FF"/>
    </linearGradient>
    <linearGradient id="cl-arrow" x1="42" y1="38" x2="68" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7FA8FF"/>
      <stop offset="100%" stop-color="#CFDFFF"/>
    </linearGradient>
  </defs>

  <!-- Orbit ring -->
  <circle cx="40" cy="40" r="32" stroke="url(#cl-grad)" stroke-width="1.4" stroke-opacity="0.45" fill="none"/>

  <!-- Orbit dots -->
  <circle cx="12" cy="28" r="2.8" fill="#2F7BFF"/>
  <circle cx="22" cy="68" r="2.2" fill="#7FA8FF" fill-opacity="0.9"/>
  <circle cx="70" cy="50" r="2.0" fill="#7FA8FF" fill-opacity="0.85"/>

  <!-- Upper chain link (opens toward lower-left) -->
  <path
    d="M44 18
       h6
       a12 12 0 0 1 12 12
       v6
       a12 12 0 0 1 -12 12
       h-6"
    stroke="url(#cl-grad)" stroke-width="5.2" stroke-linecap="round" fill="none"/>

  <!-- Lower chain link (opens toward upper-right, interlocked) -->
  <path
    d="M36 62
       h-6
       a12 12 0 0 1 -12 -12
       v-6
       a12 12 0 0 1 12 -12
       h6"
    stroke="url(#cl-grad)" stroke-width="5.2" stroke-linecap="round" fill="none"/>

  <!-- Arrow shaft -->
  <path d="M48 28 L66 10" stroke="url(#cl-arrow)" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrow head -->
  <path d="M55 8 L67 8 L67 20" stroke="url(#cl-arrow)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
